<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cohete Espacial</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }

        body{
            background: black;
            overflow: hidden;
        }

        #contenedor{
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ESTRELLAS */
        .estrella{
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            animation: parpadeo 2s infinite alternate;
        }

        @keyframes parpadeo{
            from{ opacity: 0.3; }
            to{ opacity: 1; }
        }

        /* COHETE */
        #cohete{
            width: 120px;
            position: absolute;
            bottom: -150px;
            left: -150px;

            animation: volar 6s linear infinite;
        }

        #cohete img{
            width: 100%;
        }

        /* ANIMACIÓN */
        @keyframes volar{
            0%{
                bottom: -150px;
                left: -150px;
                transform: rotate(0deg);
            }

            50%{
                transform: rotate(25deg);
            }

            100%{
                bottom: 110%;
                left: 110%;
                transform: rotate(45deg);
            }
        }

    </style>
</head>
<body>

    <div id="contenedor">

        <!-- COHETE -->
        <div id="cohete">
            <img src="imagenes/img01.png" alt="cohete">
        </div>

        <!-- ESTRELLAS -->
        <div class="estrella" style="top:10%; left:20%;"></div>
        <div class="estrella" style="top:30%; left:70%;"></div>
        <div class="estrella" style="top:50%; left:40%;"></div>
        <div class="estrella" style="top:80%; left:60%;"></div>
        <div class="estrella" style="top:15%; left:85%;"></div>
        <div class="estrella" style="top:60%; left:10%;"></div>
        <div class="estrella" style="top:25%; left:50%;"></div>
        <div class="estrella" style="top:75%; left:30%;"></div>

    </div>

</body>
</html>
